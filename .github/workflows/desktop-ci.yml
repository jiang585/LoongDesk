name: Desktop CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  rust-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --locked

  tauri-native-e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - name: Install Tauri WebDriver dependencies
        shell: pwsh
        run: |
          cargo install tauri-driver --locked
          choco install selenium-edge-driver --yes --no-progress
      - name: Build unpackaged desktop application
        run: npm run tauri build -- --debug --no-bundle
      - name: Start Tauri WebDriver
        id: driver
        shell: pwsh
        run: |
          $process = Start-Process tauri-driver -WindowStyle Hidden -PassThru
          "pid=$($process.Id)" >> $env:GITHUB_OUTPUT
          $ready = $false
          for ($attempt = 0; $attempt -lt 30; $attempt++) {
            if (Test-NetConnection 127.0.0.1 -Port 4444 -InformationLevel Quiet -WarningAction SilentlyContinue) {
              $ready = $true
              break
            }
            Start-Sleep -Milliseconds 500
          }
          if (-not $ready) { throw "tauri-driver did not become ready on port 4444" }
      - name: Exercise native desktop flow
        shell: pwsh
        env:
          TAURI_APP_PATH: ${{ github.workspace }}\src-tauri\target\debug\yuan.exe
        run: npm run test:e2e:tauri
      - name: Stop Tauri WebDriver
        if: always()
        shell: pwsh
        run: Stop-Process -Id '${{ steps.driver.outputs.pid }}' -Force -ErrorAction SilentlyContinue
