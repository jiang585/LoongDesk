name: Windows signed release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Windows code-signing certificate
        id: certificate
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            throw "WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD secrets are required."
          }
          $pfxPath = Join-Path $env:RUNNER_TEMP "loongdesk-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $securePassword = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
          Remove-Item -LiteralPath $pfxPath -Force

      - name: Generate release-only Tauri configuration
        shell: pwsh
        env:
          TAURI_UPDATER_PUBKEY: ${{ secrets.TAURI_UPDATER_PUBKEY }}
          CERTIFICATE_THUMBPRINT: ${{ steps.certificate.outputs.thumbprint }}
        run: |
          if (-not $env:TAURI_UPDATER_PUBKEY) { throw "TAURI_UPDATER_PUBKEY secret is required." }
          $config = @{
            bundle = @{
              createUpdaterArtifacts = $true
              windows = @{
                certificateThumbprint = $env:CERTIFICATE_THUMBPRINT
                digestAlgorithm = "sha256"
                timestampUrl = "http://timestamp.digicert.com"
              }
            }
            plugins = @{
              updater = @{
                pubkey = $env:TAURI_UPDATER_PUBKEY
                endpoints = @("https://github.com/jiang585/LoongDesk/releases/latest/download/latest.json")
                windows = @{ installMode = "passive" }
              }
            }
          }
          $config | ConvertTo-Json -Depth 8 | Set-Content -Encoding utf8 src-tauri\tauri.release.conf.json

      - name: Build, sign and publish updater artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 御案 v__VERSION__
          releaseBody: 请查看仓库中的版本说明与升级注意事项。
          releaseDraft: true
          prerelease: false
          args: --config src-tauri/tauri.release.conf.json

      - name: Verify signed release process survives startup
        shell: pwsh
        run: ./scripts/windows-startup-smoke.ps1 -Executable src-tauri/target/release/yuan.exe
